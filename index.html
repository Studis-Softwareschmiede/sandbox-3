<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celsius → Fahrenheit Umrechner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Celsius → Fahrenheit</h1>
  </header>

  <main>
    <section class="converter" aria-labelledby="converter-title">
      <h2 id="converter-title" class="visually-hidden">Temperatur umrechnen</h2>

      <div class="field">
        <label for="celsius">Grad Celsius (°C)</label>
        <input
          type="number"
          id="celsius"
          name="celsius"
          inputmode="decimal"
          step="any"
          autocomplete="off"
          placeholder="z. B. 100">
      </div>

      <p class="result">
        <span class="result-label">Grad Fahrenheit (°F)</span>
        <output id="fahrenheit" for="celsius" aria-live="polite">—</output>
      </p>
    </section>
  </main>

  <footer>
    <p>°F = °C × 9/5 + 32</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
