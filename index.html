<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperatur-Umrechner (°C ↔ °F)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1 id="page-title">Celsius → Fahrenheit</h1>
  </header>

  <main>
    <section class="converter" aria-labelledby="converter-title">
      <h2 id="converter-title" class="visually-hidden">Temperatur umrechnen</h2>

      <button type="button" id="toggle" class="toggle">
        Richtung wechseln: °F → °C
      </button>

      <div class="field">
        <label id="input-label" for="value">Grad Celsius (°C)</label>
        <input
          type="number"
          id="value"
          name="value"
          inputmode="decimal"
          step="any"
          autocomplete="off"
          placeholder="z. B. 100">
      </div>

      <p class="result">
        <span class="result-label" id="result-label">Grad Fahrenheit (°F)</span>
        <output id="result" for="value" aria-live="polite">—</output>
      </p>

      <p id="error" class="error" role="alert" aria-live="assertive" hidden></p>
    </section>
  </main>

  <footer>
    <p id="formula">°F = °C × 9/5 + 32</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
