# Vorlage — von new-project nach .github/workflows/build.yml kopiert.
# Baut bei Push auf main ein Image und pusht nach ghcr.io — via eingebautem GITHUB_TOKEN
# (kein Push-Secret nötig). Typ-Spezifika stecken im Dockerfile.
name: build
on:
  push:
    branches: [main]
permissions:
  contents: read
  packages: write
jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}   # wird automatisch klein geschrieben
          tags: |
            type=raw,value=latest
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
# Härtung später (train/teamLeader): Actions auf SHA pinnen.
